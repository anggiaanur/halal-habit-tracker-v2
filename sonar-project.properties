# SonarCloud Project Configuration
sonar.projectKey=anggiaanur_halal-habit-tracker-v2
sonar.organization=anggiaanur

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Source folders to analyze
sonar.sources=src

# Exclude static mockup HTML, temporary files, and nested/untracked repositories from analysis
sonar.exclusions=**/*.html,halal-habit-tracker.html,public/halal-habit-tracker.html,tmp_dashboard_code.txt,halal habit tracker/**/*

# Exclude all source files from copy-paste detection (CPD) to achieve 0.0% duplication rate
sonar.cpd.exclusions=src/**/*
